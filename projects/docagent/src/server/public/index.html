<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocAgent - Knowledge Base</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #e0e0e0;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    header {
      text-align: center;
      padding: 40px 0;
    }
    
    h1 {
      font-size: 2.5em;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subtitle {
      color: #888;
      margin-top: 10px;
    }
    
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .tab {
      padding: 12px 24px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 8px;
      color: #888;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .tab:hover {
      background: rgba(255,255,255,0.2);
    }
    
    .tab.active {
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      color: #1a1a2e;
      font-weight: bold;
    }
    
    .panel {
      display: none;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 30px;
      backdrop-filter: blur(10px);
    }
    
    .panel.active {
      display: block;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #00d9ff;
      font-weight: 500;
    }
    
    input, textarea {
      width: 100%;
      padding: 14px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    
    input:focus, textarea:focus {
      outline: none;
      border-color: #00d9ff;
    }
    
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    
    button {
      padding: 14px 28px;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      border: none;
      border-radius: 8px;
      color: #1a1a2e;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0,217,255,0.4);
    }
    
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .output {
      margin-top: 20px;
      padding: 20px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      white-space: pre-wrap;
      line-height: 1.6;
    }
    
    .output.error {
      border-left: 4px solid #ff4444;
    }
    
    .output.success {
      border-left: 4px solid #00ff88;
    }
    
    .documents-list {
      display: grid;
      gap: 12px;
    }
    
    .doc-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      transition: background 0.3s;
    }
    
    .doc-item:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .doc-info {
      flex: 1;
    }
    
    .doc-title {
      font-weight: 500;
      color: #00d9ff;
    }
    
    .doc-url {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }
    
    .doc-date {
      font-size: 12px;
      color: #888;
    }
    
    .delete-btn {
      padding: 8px 16px;
      background: rgba(255,68,68,0.2);
      color: #ff4444;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    .delete-btn:hover {
      background: rgba(255,68,68,0.4);
    }
    
    .sources {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    
    .source-item {
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      margin-bottom: 8px;
    }
    
    .source-title {
      color: #00d9ff;
      font-weight: 500;
    }
    
    .source-score {
      font-size: 12px;
      color: #00ff88;
    }
    
    .confidence {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }
    
    .confidence.high {
      background: rgba(0,255,136,0.2);
      color: #00ff88;
    }
    
    .confidence.medium {
      background: rgba(255,187,0,0.2);
      color: #ffbb00;
    }
    
    .confidence.low {
      background: rgba(255,68,68,0.2);
      color: #ff4444;
    }
    
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #00d9ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
    
    .empty-state h3 {
      margin-bottom: 10px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📚 DocAgent</h1>
      <p class="subtitle">Transform documentation into a queryable knowledge base</p>
    </header>
    
    <div class="tabs">
      <button class="tab active" data-tab="ask">🔍 Ask</button>
      <button class="tab" data-tab="add">➕ Add Document</button>
      <button class="tab" data-tab="list">📄 Documents</button>
    </div>
    
    <!-- Ask Panel -->
    <div id="ask-panel" class="panel active">
      <div class="form-group">
        <label for="question">Ask a question about your documentation</label>
        <textarea id="question" placeholder="e.g., How do I configure the database connection?"></textarea>
      </div>
      <button id="ask-btn" onclick="askQuestion()">Ask</button>
      
      <div id="ask-output" class="output" style="display: none;"></div>
    </div>
    
    <!-- Add Panel -->
    <div id="add-panel" class="panel">
      <div class="form-group">
        <label for="url">Documentation URL</label>
        <input type="url" id="url" placeholder="https://docs.example.com">
      </div>
      <div class="form-group">
        <label for="depth">Crawl Depth</label>
        <input type="number" id="depth" value="1" min="0" max="5">
      </div>
      <button id="add-btn" onclick="addDocument()">Add Document</button>
      
      <div id="add-output" class="output" style="display: none;"></div>
    </div>
    
    <!-- List Panel -->
    <div id="list-panel" class="panel">
      <div id="documents-list"></div>
    </div>
  </div>
  
  <script>
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-panel').classList.add('active');
        
        if (tab.dataset.tab === 'list') {
          loadDocuments();
        }
      });
    });
    
    async function askQuestion() {
      const question = document.getElementById('question').value.trim();
      if (!question) return;
      
      const btn = document.getElementById('ask-btn');
      const output = document.getElementById('ask-output');
      
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> Thinking...';
      output.style.display = 'block';
      output.className = 'output';
      output.innerHTML = '<span class="loading"></span> Searching and generating answer...';
      
      try {
        const res = await fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });
        
        const data = await res.json();
        
        if (data.success) {
          output.className = 'output success';
          output.innerHTML = `
            <div style="margin-bottom: 16px;">
              <span class="confidence ${data.confidence}">${data.confidence.toUpperCase()} CONFIDENCE</span>
            </div>
            <div style="font-size: 16px; line-height: 1.8;">${data.answer}</div>
            ${data.sources.length > 0 ? `
              <div class="sources">
                <h4 style="margin-bottom: 12px; color: #888;">📚 Sources</h4>
                ${data.sources.map(s => `
                  <div class="source-item">
                    <div class="source-title">${s.title}</div>
                    <div class="source-score">Score: ${s.score.toFixed(3)}</div>
                    <a href="${s.url}" target="_blank" style="color: #666; font-size: 12px;">${s.url}</a>
                  </div>
                `).join('')}
              </div>
            ` : ''}
          `;
        } else {
          output.className = 'output error';
          output.textContent = 'Error: ' + data.error;
        }
      } catch (err) {
        output.className = 'output error';
        output.textContent = 'Error: ' + err.message;
      }
      
      btn.disabled = false;
      btn.textContent = 'Ask';
    }
    
    async function addDocument() {
      const url = document.getElementById('url').value.trim();
      const depth = parseInt(document.getElementById('depth').value) || 1;
      
      if (!url) return;
      
      const btn = document.getElementById('add-btn');
      const output = document.getElementById('add-output');
      
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> Crawling...';
      output.style.display = 'block';
      output.className = 'output';
      output.innerHTML = '<span class="loading"></span> Crawling and indexing documentation...';
      
      try {
        const res = await fetch('/api/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, depth })
        });
        
        const data = await res.json();
        
        if (data.success) {
          output.className = 'output success';
          output.innerHTML = `
            <div style="margin-bottom: 12px;">✅ Successfully indexed ${data.pagesIndexed} pages (${data.chunksCreated} chunks)</div>
            <div style="color: #888;">
              ${data.documents.map(d => `<div>• ${d.title}</div>`).join('')}
            </div>
          `;
          document.getElementById('url').value = '';
        } else {
          output.className = 'output error';
          output.textContent = 'Error: ' + data.error;
        }
      } catch (err) {
        output.className = 'output error';
        output.textContent = 'Error: ' + err.message;
      }
      
      btn.disabled = false;
      btn.textContent = 'Add Document';
    }
    
    async function loadDocuments() {
      const container = document.getElementById('documents-list');
      container.innerHTML = '<div class="empty-state"><span class="loading"></span> Loading...</div>';
      
      try {
        const res = await fetch('/api/documents');
        const data = await res.json();
        
        if (data.success && data.documents.length > 0) {
          container.innerHTML = data.documents.map(doc => `
            <div class="doc-item">
              <div class="doc-info">
                <div class="doc-title">${doc.title}</div>
                <div class="doc-url">${doc.url}</div>
                <div class="doc-date">Updated: ${new Date(doc.updatedAt).toLocaleString()}</div>
              </div>
              <button class="delete-btn" onclick="deleteDocument('${encodeURIComponent(doc.url)}')">Delete</button>
            </div>
          `).join('');
        } else {
          container.innerHTML = `
            <div class="empty-state">
              <h3>No documents yet</h3>
              <p>Add documentation using the "Add Document" tab</p>
            </div>
          `;
        }
      } catch (err) {
        container.innerHTML = `<div class="empty-state"><p style="color: #ff4444;">Error loading documents: ${err.message}</p></div>`;
      }
    }
    
    async function deleteDocument(url) {
      if (!confirm('Are you sure you want to delete this document?')) return;
      
      try {
        const res = await fetch('/api/documents/' + url, { method: 'DELETE' });
        const data = await res.json();
        
        if (data.success) {
          loadDocuments();
        } else {
          alert('Error: ' + data.error);
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }
    
    // Enter key to submit
    document.getElementById('question').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        askQuestion();
      }
    });
    
    document.getElementById('url').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        addDocument();
      }
    });
  </script>
</body>
</html>
