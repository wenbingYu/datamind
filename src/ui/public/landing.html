<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataMind - 智能数据分析助手</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: #0d0d0d;
      --bg-secondary: #161616;
      --bg-tertiary: #1f1f1f;
      --bg-hover: #2a2a2a;
      --bg-message: #1a1a1a;
      --border-color: #2a2a2a;
      --text-primary: #e8e8e8;
      --text-secondary: #8a8a8a;
      --text-muted: #555;
      --accent: #6366f1;
      --accent-hover: #5558e3;
      --accent-glow: rgba(99, 102, 241, 0.15);
      --success: #22c55e;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }
    
    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
    }
    
    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }
    
    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .header-btn {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .header-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    
    /* Main Container */
    .main-container {
      padding-top: 56px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* Welcome Section */
    .welcome-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }
    
    .welcome-section.hidden {
      display: none;
    }
    
    .welcome-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 24px;
    }
    
    .welcome-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 12px;
      text-align: center;
    }
    
    .welcome-desc {
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 40px;
      font-size: 1rem;
    }
    
    /* Suggestions */
    .suggestions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      width: 100%;
      max-width: 640px;
    }
    
    .suggestion-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .suggestion-card:hover {
      border-color: var(--accent);
      background: var(--bg-tertiary);
    }
    
    .suggestion-icon {
      font-size: 1.25rem;
      margin-bottom: 8px;
    }
    
    .suggestion-text {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    
    /* Input Section */
    .input-section {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, var(--bg-primary) 80%, transparent);
      padding: 24px;
      padding-bottom: 32px;
    }
    
    .input-container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .input-wrapper {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      align-items: flex-end;
      gap: 12px;
      transition: all 0.2s;
    }
    
    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }
    
    .input-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    
    .input-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .input-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    
    .chat-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 1rem;
      line-height: 1.5;
      resize: none;
      max-height: 200px;
      outline: none;
      font-family: inherit;
    }
    
    .chat-input::placeholder {
      color: var(--text-muted);
    }
    
    .send-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    
    .send-btn:hover {
      background: var(--accent-hover);
    }
    
    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* Files Preview */
    .files-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    
    .file-tag {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }
    
    .file-tag-remove {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      font-size: 1rem;
      line-height: 1;
    }
    
    .file-tag-remove:hover {
      color: #ef4444;
    }
    
    /* Chat Section */
    .chat-section {
      flex: 1;
      padding: 24px;
      padding-bottom: 160px;
      overflow-y: auto;
    }
    
    .chat-section.hidden {
      display: none;
    }
    
    .chat-messages {
      max-width: 800px;
      margin: 0 auto;
    }
    
    /* Messages */
    .message {
      margin-bottom: 24px;
    }
    
    .message-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    
    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      background: var(--bg-tertiary);
    }
    
    .message-role {
      font-weight: 600;
      font-size: 0.9rem;
    }
    
    .message-content {
      padding-left: 42px;
      font-size: 0.95rem;
      line-height: 1.7;
    }
    
    .message-content p {
      margin-bottom: 12px;
    }
    
    .message-content p:last-child {
      margin-bottom: 0;
    }
    
    .message-content code {
      background: var(--bg-tertiary);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
      font-size: 0.9em;
    }
    
    .message-content pre {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      overflow-x: auto;
      margin: 16px 0;
    }
    
    .message-content pre code {
      background: none;
      padding: 0;
    }
    
    .message-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 0.9em;
    }
    
    .message-content th,
    .message-content td {
      padding: 10px 14px;
      border: 1px solid var(--border-color);
      text-align: left;
    }
    
    .message-content th {
      background: var(--bg-tertiary);
      font-weight: 600;
    }
    
    .message-content tr:hover td {
      background: var(--bg-hover);
    }
    
    /* SQL Block */
    .sql-block {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      margin: 12px 0;
      font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
      font-size: 0.85em;
      overflow-x: auto;
      position: relative;
    }
    
    .sql-block::before {
      content: 'SQL';
      position: absolute;
      top: 8px;
      right: 12px;
      font-size: 0.7em;
      color: var(--text-muted);
      background: var(--bg-tertiary);
      padding: 2px 8px;
      border-radius: 4px;
    }
    
    /* Chart */
    .chart-wrapper {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      margin: 16px 0;
    }
    
    .chart-wrapper .chart {
      height: 300px;
    }
    
    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 6px;
      padding: 8px 0;
    }
    
    .typing-dot {
      width: 8px;
      height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: typing 1.4s infinite ease-in-out;
    }
    
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }
    
    /* Drag overlay */
    .drag-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(99, 102, 241, 0.08);
      border: 2px dashed var(--accent);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .drag-overlay.show {
      display: flex;
    }
    
    .drag-overlay-content {
      text-align: center;
    }
    
    .drag-overlay-icon {
      font-size: 4rem;
      margin-bottom: 16px;
    }
    
    .drag-overlay-text {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--accent);
    }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: 12px 24px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
    }
    
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    
    .toast.error {
      border-color: #ef4444;
    }
    
    /* Hidden */
    input[type="file"] {
      display: none;
    }
    
    /* Responsive */
    @media (max-width: 640px) {
      .suggestions {
        grid-template-columns: 1fr;
      }
      
      .welcome-title {
        font-size: 1.5rem;
      }
      
      .input-section {
        padding: 16px;
        padding-bottom: 24px;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <a href="/" class="logo">
      <div class="logo-icon">📊</div>
      <span>DataMind</span>
    </a>
    <div class="header-actions">
      <button class="header-btn" id="newChatBtn" style="display: none;">
        ➕ 新对话
      </button>
      <button class="header-btn" id="helpBtn">
        ❓ 帮助
      </button>
    </div>
  </header>

  <!-- Main Container -->
  <div class="main-container">
    <!-- Welcome Section -->
    <div class="welcome-section" id="welcomeSection">
      <div class="welcome-icon">📊</div>
      <h1 class="welcome-title">数据分析，从此简单</h1>
      <p class="welcome-desc">上传文件，用自然语言查询和分析数据，无需 SQL / Python</p>
      
      <div class="suggestions">
        <div class="suggestion-card" onclick="sendSuggestion('帮我分析这个数据集的结构')">
          <div class="suggestion-icon">📋</div>
          <div class="suggestion-text">分析数据结构</div>
        </div>
        <div class="suggestion-card" onclick="sendSuggestion('销售额最高的 Top 10 是哪些？')">
          <div class="suggestion-icon">📈</div>
          <div class="suggestion-text">销售排名分析</div>
        </div>
        <div class="suggestion-card" onclick="sendSuggestion('帮我找出数据中的异常值')">
          <div class="suggestion-icon">⚠️</div>
          <div class="suggestion-text">异常数据检测</div>
        </div>
        <div class="suggestion-card" onclick="sendSuggestion('生成一份数据分析报告')">
          <div class="suggestion-icon">📝</div>
          <div class="suggestion-text">生成分析报告</div>
        </div>
      </div>
    </div>

    <!-- Chat Section -->
    <div class="chat-section hidden" id="chatSection">
      <div class="chat-messages" id="chatMessages"></div>
    </div>
  </div>

  <!-- Input Section -->
  <div class="input-section">
    <div class="input-container">
      <div class="files-preview" id="filesPreview"></div>
      <div class="input-wrapper">
        <div class="input-actions">
          <button class="input-btn" id="attachBtn" title="上传文件">
            📎
          </button>
        </div>
        <textarea 
          class="chat-input" 
          id="chatInput" 
          placeholder="输入问题，或拖拽文件到此处..."
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn" title="发送">
          ➤
        </button>
      </div>
    </div>
  </div>

  <!-- Drag Overlay -->
  <div class="drag-overlay" id="dragOverlay">
    <div class="drag-overlay-content">
      <div class="drag-overlay-icon">📁</div>
      <div class="drag-overlay-text">释放文件以上传</div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Hidden file input -->
  <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" multiple>

  <script>
    // Configure marked
    marked.setOptions({
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      },
      breaks: true
    });

    // API
    const API = {
      async chat(messages, files) {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages, files })
        });
        return res.json();
      },

      async uploadFile(formData) {
        const res = await fetch('/api/upload', {
          method: 'POST',
          body: formData
        });
        return res.json();
      },

      async getTables() {
        const res = await fetch('/api/tables');
        return res.json();
      }
    };

    // State
    const state = {
      messages: [],
      pendingFiles: [],
      tables: [],
      isLoading: false
    };

    // DOM elements
    const $ = id => document.getElementById(id);
    const elements = {
      welcomeSection: $('welcomeSection'),
      chatSection: $('chatSection'),
      chatMessages: $('chatMessages'),
      chatInput: $('chatInput'),
      sendBtn: $('sendBtn'),
      newChatBtn: $('newChatBtn'),
      attachBtn: $('attachBtn'),
      fileInput: $('fileInput'),
      filesPreview: $('filesPreview'),
      dragOverlay: $('dragOverlay'),
      toast: $('toast')
    };

    // Show chat
    function showChat() {
      elements.welcomeSection.classList.add('hidden');
      elements.chatSection.classList.remove('hidden');
      elements.newChatBtn.style.display = 'flex';
    }

    // Hide chat
    function hideChat() {
      elements.welcomeSection.classList.remove('hidden');
      elements.chatSection.classList.add('hidden');
      elements.newChatBtn.style.display = 'none';
      state.messages = [];
      renderMessages();
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Render messages
    function renderMessages() {
      if (state.messages.length === 0) {
        elements.chatMessages.innerHTML = '';
        return;
      }

      elements.chatMessages.innerHTML = state.messages.map(msg => {
        const isUser = msg.role === 'user';
        const avatar = isUser ? '👤' : '📊';
        const role = isUser ? '你' : 'DataMind';

        let content = '';
        if (isUser) {
          content = escapeHtml(msg.content);
          if (msg.files && msg.files.length > 0) {
            content = '<div style="margin-bottom: 8px; font-size: 0.85em; color: var(--text-secondary);">' +
              msg.files.map(f => `📎 ${f.name}`).join('<br>') + '</div>' + content;
          }
        } else {
          content = renderAIContent(msg.content, msg.data);
        }

        return `
          <div class="message">
            <div class="message-header">
              <div class="message-avatar">${avatar}</div>
              <div class="message-role">${role}</div>
            </div>
            <div class="message-content">${content}</div>
          </div>
        `;
      }).join('');

      scrollToBottom();
    }

    // Render AI content
    function renderAIContent(content, data) {
      let html = marked.parse(content);

      if (data && data.rows && data.rows.length > 0) {
        html += renderDataTable(data);

        if (data.columns && data.columns.length >= 2) {
          const chartId = 'chart_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
          html += `<div class="chart-wrapper"><div class="chart" id="${chartId}"></div></div>`;

          setTimeout(() => {
            initChart(chartId, data);
          }, 100);
        }
      }

      return html;
    }

    // Render data table
    function renderDataTable(data) {
      const maxRows = 15;
      const displayRows = data.rows.slice(0, maxRows);

      let html = `<div class="sql-block">${escapeHtml(data.sql)}</div>`;

      if (data.rowCount !== undefined) {
        html += `<p style="color: var(--text-secondary); font-size: 0.85em; margin: 8px 0;">查询返回 ${data.rowCount} 行，耗时 ${data.executionTime}ms</p>`;
      }

      html += '<table><thead><tr>';
      html += data.columns.map(c => `<th>${escapeHtml(c)}</th>`).join('');
      html += '</tr></thead><tbody>';

      displayRows.forEach(row => {
        html += '<tr>';
        data.columns.forEach(c => {
          const val = row[c];
          html += `<td>${val === null ? '<span style="color: var(--text-muted);">NULL</span>' : escapeHtml(String(val))}</td>`;
        });
        html += '</tr>';
      });

      html += '</tbody></table>';

      if (data.rows.length > maxRows) {
        html += `<p style="color: var(--text-secondary); font-size: 0.85em; margin: 8px 0;">显示前 ${maxRows} 行，共 ${data.rows.length} 行</p>`;
      }

      return html;
    }

    // Initialize chart
    function initChart(chartId, data) {
      const chartEl = document.getElementById(chartId);
      if (!chartEl) return;

      const xCol = data.columns[0];
      const yCol = data.columns[1] || data.columns[0];

      const chart = echarts.init(chartEl);

      chart.setOption({
        backgroundColor: 'transparent',
        tooltip: { trigger: 'axis' },
        grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
        xAxis: {
          type: 'category',
          data: data.rows.slice(0, 15).map(r => String(r[xCol])),
          axisLine: { lineStyle: { color: '#333' } },
          axisLabel: { color: '#8a8a8a', rotate: 30 }
        },
        yAxis: {
          type: 'value',
          splitLine: { lineStyle: { color: '#222' } },
          axisLabel: { color: '#8a8a8a' }
        },
        series: [{
          type: 'bar',
          data: data.rows.slice(0, 15).map(r => r[yCol]),
          itemStyle: { color: '#6366f1', borderRadius: [4, 4, 0, 0] }
        }]
      });
    }

    // Scroll to bottom
    function scrollToBottom() {
      elements.chatSection.scrollTop = elements.chatSection.scrollHeight;
    }

    // Send message
    async function sendMessage() {
      const content = elements.chatInput.value.trim();

      if (!content && state.pendingFiles.length === 0) {
        showToast('请输入问题或上传文件', 'error');
        return;
      }

      if (state.isLoading) return;

      showChat();

      // Add user message
      const userMessage = {
        role: 'user',
        content: content,
        files: state.pendingFiles.map(f => ({ name: f.name, id: f.id }))
      };
      state.messages.push(userMessage);

      // Clear input
      elements.chatInput.value = '';
      elements.chatInput.style.height = 'auto';

      // Upload pending files
      const uploadedFiles = [];
      for (const file of state.pendingFiles) {
        if (file.file) {
          try {
            const formData = new FormData();
            formData.append('file', file.file);
            const result = await API.uploadFile(formData);
            if (result.success) {
              uploadedFiles.push(result.data);
            }
          } catch (e) {
            console.error('Upload failed:', e);
          }
        } else if (file.id) {
          uploadedFiles.push({ name: file.name, id: file.id });
        }
      }
      state.pendingFiles = [];
      renderFilesPreview();

      renderMessages();

      // Show loading
      state.isLoading = true;
      elements.sendBtn.disabled = true;

      // Add typing indicator
      const typingId = 'typing_' + Date.now();
      elements.chatMessages.innerHTML += `
        <div class="message" id="${typingId}">
          <div class="message-header">
            <div class="message-avatar">📊</div>
            <div class="message-role">DataMind</div>
          </div>
          <div class="message-content">
            <div class="typing-indicator">
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
            </div>
          </div>
        </div>
      `;
      scrollToBottom();

      try {
        const result = await API.chat(
          state.messages.filter(m => m.role === 'user').map(m => ({ role: m.role, content: m.content })),
          uploadedFiles
        );

        // Remove typing indicator
        const typingEl = document.getElementById(typingId);
        if (typingEl) typingEl.remove();

        if (result.success) {
          const aiMessage = {
            role: 'assistant',
            content: result.data.message || '查询完成',
            data: result.data
          };
          state.messages.push(aiMessage);
          renderMessages();
        } else {
          showToast(result.error || '查询失败', 'error');
          state.messages.push({
            role: 'assistant',
            content: `抱歉，查询时出现问题：${result.error}`
          });
          renderMessages();
        }
      } catch (error) {
        const typingEl = document.getElementById(typingId);
        if (typingEl) typingEl.remove();
        showToast('请求失败: ' + error.message, 'error');
        state.messages.push({
          role: 'assistant',
          content: `网络错误：${error.message}`
        });
        renderMessages();
      } finally {
        state.isLoading = false;
        elements.sendBtn.disabled = false;
      }
    }

    // Send suggestion
    window.sendSuggestion = function(text) {
      elements.chatInput.value = text;
      sendMessage();
    };

    // Handle files
    function handleFiles(files) {
      for (const file of files) {
        if (file.name.endsWith('.csv') || file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
          state.pendingFiles.push({
            name: file.name,
            file: file,
            id: null
          });
        } else {
          showToast(`不支持的文件类型: ${file.name}`, 'error');
        }
      }
      renderFilesPreview();
    }

    // Render files preview
    function renderFilesPreview() {
      if (state.pendingFiles.length === 0) {
        elements.filesPreview.innerHTML = '';
        return;
      }

      elements.filesPreview.innerHTML = state.pendingFiles.map((f, idx) => `
        <div class="file-tag">
          <span>📎 ${f.name}</span>
          <button class="file-tag-remove" onclick="removeFile(${idx})">✕</button>
        </div>
      `).join('');
    }

    // Remove file
    window.removeFile = function(idx) {
      state.pendingFiles.splice(idx, 1);
      renderFilesPreview();
    };

    // Toast
    function showToast(message, type = 'success') {
      elements.toast.textContent = message;
      elements.toast.className = `toast ${type} show`;
      setTimeout(() => {
        elements.toast.classList.remove('show');
      }, 3000);
    }

    // Auto-resize textarea
    function autoResize() {
      elements.chatInput.style.height = 'auto';
      elements.chatInput.style.height = Math.min(elements.chatInput.scrollHeight, 200) + 'px';
    }

    // Event listeners
    elements.sendBtn.addEventListener('click', sendMessage);

    elements.chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    elements.chatInput.addEventListener('input', autoResize);

    elements.newChatBtn.addEventListener('click', hideChat);

    elements.attachBtn.addEventListener('click', () => elements.fileInput.click());

    elements.fileInput.addEventListener('change', (e) => {
      handleFiles(e.target.files);
      e.target.value = '';
    });

    // Drag and drop
    document.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (e.dataTransfer.types.includes('Files')) {
        elements.dragOverlay.classList.add('show');
      }
    });

    document.addEventListener('dragleave', (e) => {
      if (e.relatedTarget === null) {
        elements.dragOverlay.classList.remove('show');
      }
    });

    document.addEventListener('drop', (e) => {
      e.preventDefault();
      elements.dragOverlay.classList.remove('show');
      if (e.dataTransfer.files.length > 0) {
        handleFiles(e.dataTransfer.files);
      }
    });

    // Initialize
    API.getTables().then(result => {
      if (result.success) {
        state.tables = result.data;
      }
    });
  </script>
</body>
</html>
