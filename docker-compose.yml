version: '3.8'

services:
  datamind:
    build: .
    container_name: datamind
    ports:
      - "3000:3000"
    # 绑定挂载：本地 ~/.datamind 目录
    volumes:
      - ${HOME}/.datamind:/root/.datamind
    environment:
      - DATAMIND_API_KEY=${DATAMIND_API_KEY}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
    restart: unless-stopped